<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>HSEGate AI - Scanner EPI temps réel</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --secondary: #7c3aed;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --dark: #0f172a;
            --gray: #64748b;
            --light: #f8fafc;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            min-height: 100vh;
            color: white;
        }

        /* Layout */
        .app-container {
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            width: 280px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            position: fixed;
            height: 100vh;
        }

        .sidebar-header {
            padding: 1.5rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-size: 1.25rem;
            font-weight: 700;
        }

        .logo i {
            font-size: 1.75rem;
            color: var(--primary);
        }

        .nav-menu {
            flex: 1;
            padding: 1.5rem;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0.75rem 1rem;
            margin-bottom: 0.5rem;
            border-radius: 12px;
            color: #94a3b8;
            text-decoration: none;
            transition: all 0.3s;
        }

        .nav-item:hover, .nav-item.active {
            background: rgba(37, 99, 235, 0.2);
            color: white;
        }

        /* Main Content */
        .main-content {
            flex: 1;
            margin-left: 280px;
            padding: 1.5rem;
        }

        /* Header */
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .page-header h1 {
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        /* Camera Container */
        .camera-container {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 20px;
            padding: 1rem;
            margin-bottom: 1.5rem;
        }

        .video-wrapper {
            position: relative;
            border-radius: 16px;
            overflow: hidden;
            background: #000;
            aspect-ratio: 16/9;
        }

        #video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .camera-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 3px solid rgba(37, 99, 235, 0.5);
            border-radius: 16px;
            pointer-events: none;
        }

        .camera-controls {
            display: flex;
            gap: 1rem;
            margin-top: 1rem;
            justify-content: center;
        }

        /* Detection Results */
        .results-panel {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }

        .result-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 1.25rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .result-card h3 {
            font-size: 1rem;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding-bottom: 0.75rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* PPE Status Grid */
        .ppe-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0.75rem;
        }

        .ppe-item {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 0.75rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            transition: all 0.3s;
        }

        .ppe-item.compliant {
            background: rgba(16, 185, 129, 0.2);
            border-left: 3px solid var(--success);
        }

        .ppe-item.missing {
            background: rgba(239, 68, 68, 0.2);
            border-left: 3px solid var(--danger);
        }

        .ppe-icon {
            width: 40px;
            height: 40px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.25rem;
        }

        .ppe-info {
            flex: 1;
        }

        .ppe-name {
            font-size: 0.875rem;
            font-weight: 500;
        }

        .ppe-status {
            font-size: 0.75rem;
            opacity: 0.7;
        }

        /* Alerts List */
        .alerts-list {
            max-height: 300px;
            overflow-y: auto;
        }

        .alert-item {
            background: rgba(239, 68, 68, 0.15);
            border-left: 3px solid var(--danger);
            padding: 0.75rem;
            border-radius: 10px;
            margin-bottom: 0.5rem;
            font-size: 0.875rem;
        }

        /* Buttons */
        .btn {
            padding: 0.625rem 1.25rem;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            border: none;
            font-size: 0.875rem;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            filter: brightness(1.05);
        }

        .btn-danger {
            background: var(--danger);
            color: white;
        }

        .btn-success {
            background: var(--success);
            color: white;
        }

        /* Status Badge */
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            border-radius: 50px;
            font-size: 0.875rem;
            font-weight: 600;
        }

        .status-badge.success {
            background: rgba(16, 185, 129, 0.2);
            color: #10b981;
        }

        .status-badge.danger {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
        }

        /* Loading */
        .loading-spinner {
            text-align: center;
            padding: 2rem;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Responsive */
        @media (max-width: 1024px) {
            .results-panel {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 768px) {
            .sidebar {
                transform: translateX(-100%);
                position: fixed;
                z-index: 100;
            }
            .main-content {
                margin-left: 0;
                padding: 1rem;
            }
            .ppe-grid {
                grid-template-columns: 1fr;
            }
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb {
            background: var(--primary);
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <i class="fas fa-shield-alt"></i>
                    <span>HSEGate AI</span>
                </div>
            </div>
            <nav class="nav-menu">
                <a href="index.html" class="nav-item">
                    <i class="fas fa-tachometer-alt"></i> Dashboard
                </a>
                <a href="workers.html" class="nav-item">
                    <i class="fas fa-users"></i> Travailleurs
                </a>
                <a href="camera_scanner.html" class="nav-item active">
                    <i class="fas fa-camera"></i> Scanner EPI
                </a>
                <a href="incidents.html" class="nav-item">
                    <i class="fas fa-exclamation-triangle"></i> Incidents
                </a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <div class="page-header">
                <h1><i class="fas fa-camera"></i> Scanner EPI temps réel</h1>
                <div id="liveStatus" class="status-badge success">
                    <i class="fas fa-circle"></i> Live
                </div>
            </div>

            <!-- Camera Section -->
            <div class="camera-container">
                <div class="video-wrapper">
                    <video id="video" autoplay playsinline></video>
                    <div class="camera-overlay"></div>
                </div>
                <div class="camera-controls">
                    <button id="startCameraBtn" class="btn btn-primary" onclick="startCamera()">
                        <i class="fas fa-play"></i> Démarrer Caméra
                    </button>
                    <button id="captureBtn" class="btn btn-success" onclick="captureAndAnalyze()" style="display:none;">
                        <i class="fas fa-camera"></i> Analyser
                    </button>
                    <button id="stopCameraBtn" class="btn btn-danger" onclick="stopCamera()" style="display:none;">
                        <i class="fas fa-stop"></i> Arrêter
                    </button>
                </div>
            </div>

            <!-- Results Panel -->
            <div class="results-panel">
                <!-- PPE Status Card -->
                <div class="result-card">
                    <h3><i class="fas fa-helmet-safety"></i> Équipements détectés</h3>
                    <div id="ppeStatusGrid" class="ppe-grid">
                        <div class="ppe-item">
                            <div class="ppe-icon"><i class="fas fa-helmet-safety"></i></div>
                            <div class="ppe-info">
                                <div class="ppe-name">Casque</div>
                                <div class="ppe-status">En attente...</div>
                            </div>
                        </div>
                        <div class="ppe-item">
                            <div class="ppe-icon"><i class="fas fa-vest"></i></div>
                            <div class="ppe-info">
                                <div class="ppe-name">Gilet</div>
                                <div class="ppe-status">En attente...</div>
                            </div>
                        </div>
                        <div class="ppe-item">
                            <div class="ppe-icon"><i class="fas fa-hand-paper"></i></div>
                            <div class="ppe-info">
                                <div class="ppe-name">Gants</div>
                                <div class="ppe-status">En attente...</div>
                            </div>
                        </div>
                        <div class="ppe-item">
                            <div class="ppe-icon"><i class="fas fa-shoe-prints"></i></div>
                            <div class="ppe-info">
                                <div class="ppe-name">Bottes</div>
                                <div class="ppe-status">En attente...</div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Alerts Card -->
                <div class="result-card">
                    <h3><i class="fas fa-bell"></i> Alertes de sécurité</h3>
                    <div id="alertsList" class="alerts-list">
                        <div class="loading-spinner" style="padding: 1rem;">
                            <div class="spinner" style="width: 30px; height: 30px;"></div>
                            <p style="font-size: 0.875rem;">En attente d'analyse...</p>
                        </div>
                    </div>
                    <div id="accessDecision" style="margin-top: 1rem; text-align: center; padding: 0.75rem; border-radius: 12px; background: rgba(0,0,0,0.2);">
                        <span id="accessText">⏳ En attente</span>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        let stream = null;
        let video = null;
        let isAnalyzing = false;

        // Configuration
        const API_BASE = 'http://localhost:8000/api/v1';
        const ADMIN_EMAIL = 'admin@hsegate.com';
        const ADMIN_PASSWORD = 'admin123';

        let authToken = null;

        // Authentification
        async function authenticate() {
            try {
                const response = await fetch(`${API_BASE}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: ADMIN_EMAIL, password: ADMIN_PASSWORD })
                });
                if (response.ok) {
                    const data = await response.json();
                    authToken = data.access_token;
                    console.log('✅ Authentifié');
                    return true;
                }
                return false;
            } catch (error) {
                console.error('❌ Auth error:', error);
                return false;
            }
        }

        // Démarrer la caméra
        async function startCamera() {
            video = document.getElementById('video');
            try {
                stream = await navigator.mediaDevices.getUserMedia({ video: true });
                video.srcObject = stream;
                await video.play();
                
                document.getElementById('startCameraBtn').style.display = 'none';
                document.getElementById('captureBtn').style.display = 'inline-flex';
                document.getElementById('stopCameraBtn').style.display = 'inline-flex';
                
                updateLiveStatus('active', 'Caméra active');
            } catch (error) {
                console.error('Camera error:', error);
                updateLiveStatus('error', 'Erreur caméra');
            }
        }

        // Arrêter la caméra
        function stopCamera() {
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
                stream = null;
            }
            if (video) {
                video.srcObject = null;
            }
            document.getElementById('startCameraBtn').style.display = 'inline-flex';
            document.getElementById('captureBtn').style.display = 'none';
            document.getElementById('stopCameraBtn').style.display = 'none';
            updateLiveStatus('inactive', 'Caméra arrêtée');
        }

        // Capturer et analyser
        async function captureAndAnalyze() {
            if (!video || !video.videoWidth || isAnalyzing) return;
            
            isAnalyzing = true;
            updateLiveStatus('analyzing', 'Analyse en cours...');
            
            try {
                // Capturer l'image
                const canvas = document.createElement('canvas');
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                
                // Convertir en base64
                const imageData = canvas.toDataURL('image/jpeg', 0.8);
                const base64Image = imageData.split(',')[1];
                
                // Envoyer à l'API
                if (!authToken) await authenticate();
                
                const blob = await (await fetch(imageData)).blob();
                const formData = new FormData();
                formData.append('file', blob, 'capture.jpg');
                
                const response = await fetch(`${API_BASE}/ppe/detect`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${authToken}` },
                    body: formData
                });
                
                if (response.ok) {
                    const result = await response.json();
                    updateUI(result);
                } else {
                    console.error('API error:', response.status);
                }
            } catch (error) {
                console.error('Analysis error:', error);
            } finally {
                isAnalyzing = false;
                updateLiveStatus('active', 'Prêt');
            }
        }

        // Mettre à jour l'interface
        function updateUI(result) {
            // Mettre à jour les EPI
            const ppeItems = ['helmet', 'vest', 'gloves', 'boots'];
            ppeItems.forEach(item => {
                const element = document.querySelector(`.ppe-item .ppe-name:contains('${getPpeName(item)}')`)?.parentElement?.parentElement;
                if (element) {
                    const isDetected = result.ppe_status?.[item] || false;
                    element.classList.remove('compliant', 'missing');
                    element.classList.add(isDetected ? 'compliant' : 'missing');
                    const statusSpan = element.querySelector('.ppe-status');
                    if (statusSpan) {
                        statusSpan.textContent = isDetected ? '✅ Détecté' : '❌ Non détecté';
                    }
                }
            });
            
            // Mettre à jour les alertes
            const alertsDiv = document.getElementById('alertsList');
            if (result.missing_ppe && result.missing_ppe.length > 0) {
                alertsDiv.innerHTML = result.missing_ppe.map(missing => `
                    <div class="alert-item">
                        <i class="fas fa-exclamation-triangle"></i>
                        ⚠️ ${getPpeName(missing)} manquant
                    </div>
                `).join('');
            } else {
                alertsDiv.innerHTML = '<div class="alert-item" style="background: rgba(16,185,129,0.15); border-left-color: #10b981;"><i class="fas fa-check-circle"></i> ✅ Tous les EPI obligatoires sont présents</div>';
            }
            
            // Décision d'accès
            const accessDiv = document.getElementById('accessText');
            if (result.compliant) {
                accessDiv.innerHTML = '<i class="fas fa-check-circle"></i> ACCÈS AUTORISÉ - EPI conformes';
                document.getElementById('accessDecision').style.background = 'rgba(16,185,129,0.2)';
                document.getElementById('accessDecision').style.border = '1px solid #10b981';
            } else {
                accessDiv.innerHTML = '<i class="fas fa-ban"></i> ACCÈS REFUSÉ - EPI non conformes';
                document.getElementById('accessDecision').style.background = 'rgba(239,68,68,0.2)';
                document.getElementById('accessDecision').style.border = '1px solid #ef4444';
            }
        }

        function getPpeName(key) {
            const names = {
                'helmet': 'Casque', 'Hard_hat': 'Casque',
                'vest': 'Gilet', 'Vest': 'Gilet',
                'gloves': 'Gants', 'Gloves': 'Gants',
                'boots': 'Bottes', 'Safety_boots': 'Bottes'
            };
            return names[key] || key;
        }

        function updateLiveStatus(status, message) {
            const badge = document.getElementById('liveStatus');
            badge.innerHTML = `<i class="fas fa-circle"></i> ${message}`;
            badge.className = `status-badge ${status === 'active' ? 'success' : 'danger'}`;
        }

        // Analyse automatique périodique
        let autoInterval = null;
        
        function startAutoAnalysis() {
            if (autoInterval) clearInterval(autoInterval);
            autoInterval = setInterval(() => {
                if (stream && video && video.videoWidth && !isAnalyzing) {
                    captureAndAnalyze();
                }
            }, 3000);
        }
        
        // Initialisation
        document.addEventListener('DOMContentLoaded', async () => {
            await authenticate();
            startAutoAnalysis();
        });
        
        // Nettoyage
        window.addEventListener('beforeunload', () => {
            if (autoInterval) clearInterval(autoInterval);
            stopCamera();
        });
    </script>
</body>
</html>
