<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>HSEGate AI - Scanner EPI temps réel</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        /* Styles spécifiques au scanner */
        .scanner-container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .camera-section {
            background: white;
            border-radius: var(--border-radius);
            padding: 1.5rem;
            box-shadow: var(--shadow);
            margin-bottom: 2rem;
        }

        .video-wrapper {
            position: relative;
            background: #000;
            border-radius: var(--border-radius);
            overflow: hidden;
            aspect-ratio: 16/9;
        }

        #video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .camera-controls {
            display: flex;
            gap: 1rem;
            margin-top: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .results-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }

        .result-card {
            background: white;
            border-radius: var(--border-radius);
            padding: 1.5rem;
            box-shadow: var(--shadow);
        }

        .result-card h3 {
            margin-bottom: 1rem;
            color: var(--primary-color);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .ppe-status-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
        }

        .ppe-status-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0.75rem;
            border-radius: var(--border-radius);
            background: var(--light-gray);
            transition: all 0.3s;
        }

        .ppe-status-item.compliant {
            background: #dcfce7;
            border-left: 4px solid var(--success-color);
        }

        .ppe-status-item.missing {
            background: #fee2e2;
            border-left: 4px solid var(--danger-color);
        }

        .ppe-icon {
            width: 45px;
            height: 45px;
            background: white;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
        }

        .ppe-info {
            flex: 1;
        }

        .ppe-name {
            font-weight: 600;
        }

        .ppe-status {
            font-size: 0.8rem;
            color: var(--dark-gray);
        }

        .alerts-list {
            max-height: 300px;
            overflow-y: auto;
        }

        .alert-item {
            background: #fee2e2;
            padding: 0.75rem;
            border-radius: var(--border-radius);
            margin-bottom: 0.5rem;
            border-left: 4px solid var(--danger-color);
            font-size: 0.9rem;
        }

        .access-decision {
            margin-top: 1rem;
            padding: 1rem;
            border-radius: var(--border-radius);
            text-align: center;
            font-weight: 600;
            font-size: 1.1rem;
        }

        .access-granted {
            background: #dcfce7;
            color: #166534;
            border: 1px solid #86efac;
        }

        .access-denied {
            background: #fee2e2;
            color: #991b1b;
            border: 1px solid #fca5a5;
        }

        .live-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.25rem 0.75rem;
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .live-badge.active {
            background: #dcfce7;
            color: #166534;
        }

        .live-badge.inactive {
            background: #fee2e2;
            color: #991b1b;
        }

        @media (max-width: 768px) {
            .results-grid {
                grid-template-columns: 1fr;
            }
            .ppe-status-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <nav class="navbar">
            <div class="navbar-brand">
                <h1><i class="fas fa-camera"></i> HSEGate AI - Scanner EPI</h1>
            </div>
            <div class="navbar-menu">
                <a href="index.html" class="nav-link">
                    <i class="fas fa-chart-line"></i> Dashboard
                </a>
                <a href="workers.html" class="nav-link">
                    <i class="fas fa-users"></i> Travailleurs
                </a>
                <a href="register.html" class="nav-link">
                    <i class="fas fa-user-plus"></i> Enregistrement
                </a>
                <a href="scanner.html" class="nav-link active">
                    <i class="fas fa-camera"></i> Scanner
                </a>
            </div>
        </nav>

        <main class="main-content">
            <div class="scanner-container">
                <div class="camera-section">
                    <div class="video-wrapper">
                        <video id="video" autoplay playsinline></video>
                    </div>
                    <div class="camera-controls">
                        <button id="startCameraBtn" class="btn btn-primary" onclick="startCamera()">
                            <i class="fas fa-play"></i> Démarrer Caméra
                        </button>
                        <button id="captureBtn" class="btn btn-success" onclick="captureAndAnalyze()" style="display:none;">
                            <i class="fas fa-camera"></i> Analyser
                        </button>
                        <button id="stopCameraBtn" class="btn btn-danger" onclick="stopCamera()" style="display:none;">
                            <i class="fas fa-stop"></i> Arrêter
                        </button>
                    </div>
                </div>

                <div class="results-grid">
                    <!-- Statut EPI -->
                    <div class="result-card">
                        <h3><i class="fas fa-helmet-safety"></i> Équipements détectés</h3>
                        <div id="ppeStatusGrid" class="ppe-status-grid">
                            <div class="ppe-status-item">
                                <div class="ppe-icon"><i class="fas fa-helmet-safety"></i></div>
                                <div class="ppe-info">
                                    <div class="ppe-name">Casque</div>
                                    <div class="ppe-status" id="status-helmet">En attente...</div>
                                </div>
                            </div>
                            <div class="ppe-status-item">
                                <div class="ppe-icon"><i class="fas fa-vest"></i></div>
                                <div class="ppe-info">
                                    <div class="ppe-name">Gilet</div>
                                    <div class="ppe-status" id="status-vest">En attente...</div>
                                </div>
                            </div>
                            <div class="ppe-status-item">
                                <div class="ppe-icon"><i class="fas fa-hand-paper"></i></div>
                                <div class="ppe-info">
                                    <div class="ppe-name">Gants</div>
                                    <div class="ppe-status" id="status-gloves">En attente...</div>
                                </div>
                            </div>
                            <div class="ppe-status-item">
                                <div class="ppe-icon"><i class="fas fa-shoe-prints"></i></div>
                                <div class="ppe-info">
                                    <div class="ppe-name">Bottes</div>
                                    <div class="ppe-status" id="status-boots">En attente...</div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Alertes -->
                    <div class="result-card">
                        <h3><i class="fas fa-bell"></i> Alertes sécurité</h3>
                        <div id="alertsList" class="alerts-list">
                            <p style="text-align: center; color: var(--dark-gray);">En attente d'analyse...</p>
                        </div>
                        <div id="accessDecision" class="access-decision access-denied">
                            <span id="accessText">⏳ En attente</span>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="js/api.js"></script>
    <script>
        const API_BASE = 'http://localhost:8000/api/v1';
        let stream = null;
        let video = null;
        let isAnalyzing = false;
        let autoInterval = null;

        // Démarrer la caméra
        async function startCamera() {
            video = document.getElementById('video');
            try {
                stream = await navigator.mediaDevices.getUserMedia({ video: true });
                video.srcObject = stream;
                await video.play();
                
                document.getElementById('startCameraBtn').style.display = 'none';
                document.getElementById('captureBtn').style.display = 'inline-flex';
                document.getElementById('stopCameraBtn').style.display = 'inline-flex';
                
                // Démarrer l'analyse automatique
                startAutoAnalysis();
            } catch (error) {
                console.error('Camera error:', error);
                alert('Impossible d\'accéder à la caméra');
            }
        }

        // Arrêter la caméra
        function stopCamera() {
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
                stream = null;
            }
            if (video) {
                video.srcObject = null;
            }
            if (autoInterval) {
                clearInterval(autoInterval);
                autoInterval = null;
            }
            document.getElementById('startCameraBtn').style.display = 'inline-flex';
            document.getElementById('captureBtn').style.display = 'none';
            document.getElementById('stopCameraBtn').style.display = 'none';
        }

        // Analyse automatique périodique
        function startAutoAnalysis() {
            if (autoInterval) clearInterval(autoInterval);
            autoInterval = setInterval(() => {
                if (stream && video && video.videoWidth && !isAnalyzing) {
                    captureAndAnalyze();
                }
            }, 3000);
        }

        // Capturer et analyser
        async function captureAndAnalyze() {
            if (!video || !video.videoWidth || isAnalyzing) return;
            
            isAnalyzing = true;
            
            try {
                // Capturer l'image
                const canvas = document.createElement('canvas');
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                
                // Convertir en blob
                const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/jpeg', 0.8));
                const formData = new FormData();
                formData.append('file', blob, 'capture.jpg');
                
                // S'assurer d'être authentifié
                await api.ensureAuthenticated();
                
                // Appeler l'API PPE
                const response = await fetch(`${API_BASE}/ppe/detect`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${api.token}` },
                    body: formData
                });
                
                if (response.ok) {
                    const result = await response.json();
                    updateUI(result);
                }
            } catch (error) {
                console.error('Analysis error:', error);
            } finally {
                isAnalyzing = false;
            }
        }

        // Mettre à jour l'interface
        function updateUI(result) {
            // Mettre à jour les statuts EPI
            const ppeStatus = result.ppe_status || {};
            
            updatePpeItem('helmet', ppeStatus.helmet, 'Casque');
            updatePpeItem('vest', ppeStatus.vest, 'Gilet');
            updatePpeItem('gloves', ppeStatus.gloves, 'Gants');
            updatePpeItem('boots', ppeStatus.boots, 'Bottes');
            
            // Mettre à jour les alertes
            const alertsDiv = document.getElementById('alertsList');
            if (result.missing_ppe && result.missing_ppe.length > 0) {
                alertsDiv.innerHTML = result.missing_ppe.map(missing => `
                    <div class="alert-item">
                        <i class="fas fa-exclamation-triangle"></i>
                        ⚠️ ${getPpeName(missing)} manquant
                    </div>
                `).join('');
            } else {
                alertsDiv.innerHTML = '<div class="alert-item" style="background: #dcfce7; border-left-color: #16a34a;"><i class="fas fa-check-circle"></i> ✅ Tous les EPI sont présents</div>';
            }
            
            // Décision d'accès
            const accessDiv = document.getElementById('accessDecision');
            const accessText = document.getElementById('accessText');
            
            if (result.compliant) {
                accessDiv.className = 'access-decision access-granted';
                accessText.innerHTML = '<i class="fas fa-check-circle"></i> ACCÈS AUTORISÉ - EPI conformes';
            } else {
                accessDiv.className = 'access-decision access-denied';
                accessText.innerHTML = '<i class="fas fa-ban"></i> ACCÈS REFUSÉ - EPI non conformes';
            }
        }

        function updatePpeItem(id, detected, name) {
            const element = document.getElementById(`status-${id}`).parentElement.parentElement;
            if (detected) {
                element.classList.add('compliant');
                element.classList.remove('missing');
                document.getElementById(`status-${id}`).innerHTML = '✅ Détecté';
            } else {
                element.classList.add('missing');
                element.classList.remove('compliant');
                document.getElementById(`status-${id}`).innerHTML = '❌ Non détecté';
            }
        }

        function getPpeName(key) {
            const names = {
                'Hard_hat': 'Casque', 'helmet': 'Casque',
                'Vest': 'Gilet', 'vest': 'Gilet',
                'Gloves': 'Gants', 'gloves': 'Gants',
                'Safety_boots': 'Bottes', 'boots': 'Bottes'
            };
            return names[key] || key;
        }
    </script>
</body>
</html>
